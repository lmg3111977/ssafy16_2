name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore festival data
        id: restore
        continue-on-error: true
        run: node scripts/restore-data.mjs > restore.log 2>&1

      - name: Upload restore diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restore-diagnostics
          path: restore.log
          retention-days: 1

      - name: Stop when data restoration failed
        if: steps.restore.outcome == 'failure'
        run: |
          cat restore.log
          exit 1

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Verify project
        run: npm run check
