name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore festival data
        run: node scripts/restore-data.mjs

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Verify project
        run: npm run check
